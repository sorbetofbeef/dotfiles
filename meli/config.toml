## Setting up a Gmail account
#[accounts."gmail"]
#root_mailbox = '[Gmail]'
#format = "imap"
#server_hostname='imap.gmail.com'
#server_password="password"
#server_username="username@gmail.com"
#server_port="993"
#index_style = "Conversations"
#identity = "username@gmail.com"
#display_name = "Name Name"
### match every mailbox:
#subscribed_mailboxes = ["*" ]
#composing.send_mail = 'msmtp --read-recipients --read-envelope-from'
### Gmail auto saves sent mail to Sent folder, so don't duplicate the effort:
#composing.store_sent_mail = false
#
#
[pager]
filter = "COLUMNS=72 /usr/local/bin/pygmentize -l email"
pager_context = 0 # default, optional
headers_sticky = true # default, optional
#
[notifications]
script = "notify-send"
# xbiff_file_path = "path" # for use with xbiff(1)
play_sound = false # default, optional
# sound_file = "path" # optional
#
###shortcuts
[shortcuts.composing]
edit_mail = 'e'
#
##Thread view defaults:
[shortcuts.compact-listing]
exit_thread = 'i'
#
[shortcuts.contact-list]
create_contact = 'c'
edit_contact = 'e'
#
##Mail listing defaults
[shortcuts.listing]
prev_page = "PageUp"
next_page = "PageDown"
prev_mailbox = 'K'
next_mailbox = 'J'
prev_account = 'l'
next_account = 'h'
new_mail = 'm'
set_seen = 'n'
#
##Pager defaults
#
[shortcuts.pager]
scroll_up = 'k'
scroll_down = 'j'
page_up = "PageUp"
page_down = "PageDown"
#
[composing]
##required for sending e-mail
#send_mail = 'msmtp --read-recipients --read-envelope-from'
send_mail = { hostname = "smtp.office365.com", port = 587, auth = { type = "auto", username = "christian.dickerson@outlook.com", password = { type = "command_eval", value = "gpg --no-tty -q -d ~/.passwords/user.gpg" } }, security = { type = "STARTTLS" } }
editor_command = 'nvim +/^$' # optional, by default $EDITOR is used.
#
#
#[pgp]
#auto_sign = false # always sign sent messages
#auto_verify_signatures = true # always verify signatures when reading signed e-mails
#
#[terminal]
#theme = "dark" # or "light"
